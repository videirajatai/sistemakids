<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Equipe | Kids Checkin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #edf2f7; padding-bottom: 5rem; }
        .header {
            background: #0f172a;
            color: white;
            padding: 1.5rem;
            border-radius: 0 0 1.8rem 1.8rem;
            position: relative;
        }
        .logout-btn {
            position: absolute;
            top: 1rem; right: 1.5rem;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }
        .container { max-width: 800px; margin: 1.2rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .present-item {
            background: #e6f7e6;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .visitant-item { background: #fff3e0; border-left: 4px solid #f59e0b; }
        .btn-checkout { background: #ef4444; color: white; border: none; padding: 0.3rem 1rem; border-radius: 2rem; margin-left: 0.5rem; }
        .btn-print { background: #10b981; border: none; padding: 0.3rem 1rem; border-radius: 2rem; color: white; margin-left: 0.5rem; }
        .fab-visitante {
            position: fixed;
            bottom: 1.5rem; right: 1.5rem;
            background: #f59e0b;
            width: 56px; height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            border: none;
            z-index: 100;
        }
        .fab-sessao {
            bottom: 5rem;
            background: #3b82f6;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 1.8rem;
            padding: 1.5rem;
        }
        input, select { width: 100%; padding: 0.7rem; border-radius: 1rem; margin: 0.4rem 0; border: 1px solid #cbd5e1; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; top: 0; left: 0; width: 58mm; padding: 2mm; font-size: 10pt; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>👥 Equipe</h2>
        <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <h3>📅 Sessão atual</h3>
                <button class="btn-outline" onclick="openSessionModal()">+ Nova Sessão</button>
            </div>
            <select id="sessionSelect" onchange="changeSession()"></select>
        </div>

        <div class="card">
            <h3>📷 Escanear QR</h3>
            <div class="scanner-box">
                <div id="reader"></div>
                <button class="btn-primary" id="startScannerBtn" onclick="startScanner()">📸 Abrir Câmera</button>
                <button class="btn-outline" id="stopScannerBtn" onclick="stopScanner()" style="display:none;">Parar</button>
                <div id="scanResult" style="margin-top: 0.8rem;"></div>
            </div>
        </div>

        <div class="card">
            <h3>✔️ Presentes</h3>
            <div id="presentList">Carregando...</div>
        </div>
    </div>

    <div class="fab-visitante" onclick="openVisitanteModal()">➕📝</div>
    <div class="fab-visitante fab-sessao" style="bottom: 7rem;" onclick="openSessionModal()">📅+</div>

    <!-- Modal visitante -->
    <div id="visitanteModal" class="modal">
        <div class="modal-content">
            <h3>Visitante rápido</h3>
            <input type="text" id="visitantName" placeholder="Nome da criança">
            <input type="text" id="respName" placeholder="Responsável">
            <input type="tel" id="respPhone" placeholder="Telefone">
            <button class="btn-primary" onclick="registerVisitant()">Registrar</button>
            <button class="btn-outline" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <!-- Modal nova sessão -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <h3>Nova Sessão</h3>
            <input type="text" id="sessionName" placeholder="Nome (ex: Culto Domingo)">
            <input type="date" id="sessionDate">
            <input type="time" id="sessionStart">
            <input type="time" id="sessionEnd">
            <button class="btn-primary" onclick="createSession()">Criar</button>
            <button class="btn-outline" onclick="closeSessionModal()">Cancelar</button>
        </div>
    </div>

    <div id="printArea" style="display: none;"></div>

    <script>
        let currentStaffId = null, currentSessionId = null, html5QrCode = null, scannerActive = false;

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentStaffId = user.id;
            await loadSessions();
        }

        async function loadSessions() {
            const { data } = await supabaseClient.from('kids_sessions').select('id, name, session_date, is_active').order('session_date', { ascending: false });
            const select = document.getElementById('sessionSelect');
            if (data?.length) {
                select.innerHTML = data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name} (${new Date(s.session_date).toLocaleDateString()})</option>`).join('');
                const active = data.find(s => s.is_active);
                currentSessionId = active ? active.id : data[0].id;
                select.value = currentSessionId;
                await loadPresentList();
            } else {
                select.innerHTML = '<option>Nenhuma sessão. Crie uma.</option>';
            }
        }

        async function changeSession() {
            currentSessionId = document.getElementById('sessionSelect').value;
            await loadPresentList();
        }

        // Scanner
        async function startScanner() {
            if (scannerActive) return;
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, onScanError);
                scannerActive = true;
                document.getElementById('startScannerBtn').style.display = 'none';
                document.getElementById('stopScannerBtn').style.display = 'inline-block';
            } catch(e) { alert('Erro ao acessar câmera: '+e); }
        }
        function stopScanner() {
            if (html5QrCode && scannerActive) {
                html5QrCode.stop();
                scannerActive = false;
                document.getElementById('startScannerBtn').style.display = 'inline-block';
                document.getElementById('stopScannerBtn').style.display = 'none';
            }
        }
        async function onScanSuccess(decodedText) {
            stopScanner();
            if (decodedText.startsWith('checkout_')) {
                // Checkout via QR de etiqueta
                const checkinId = decodedText.split('_')[1];
                await checkoutByQR(checkinId);
            } else {
                // Token de família + child_id
                await processFamilyToken(decodedText);
            }
            setTimeout(() => startScanner(), 3000);
        }
        function onScanError(err) { console.log(err); }

        async function processFamilyToken(token) {
            const { data: tokenData, error } = await supabaseClient
                .from('kids_temporary_tokens')
                .select('*, child:child_id(id, name, allergies)')
                .eq('token', token)
                .eq('is_used', false)
                .gt('expires_at', new Date().toISOString())
                .single();
            if (error || !tokenData) {
                document.getElementById('scanResult').innerHTML = '❌ QR inválido ou expirado';
                return;
            }
            await supabaseClient.from('kids_temporary_tokens').update({ is_used: true }).eq('id', tokenData.id);
            // Fazer check-in apenas da criança vinculada ao token
            const child = tokenData.child;
            if (!child) { document.getElementById('scanResult').innerHTML = '⚠️ Criança não encontrada'; return; }
            const { data: checkin, error: ciError } = await supabaseClient
                .from('kids_check_ins')
                .insert({
                    child_id: child.id,
                    session_id: currentSessionId,
                    checked_in_by: currentStaffId,
                    token_id: tokenData.id
                })
                .select()
                .single();
            if (ciError) { alert('Erro check-in'); return; }
            document.getElementById('scanResult').innerHTML = `✅ Check-in: ${child.name}`;
            await loadPresentList();
            // Perguntar se quer imprimir etiqueta com QR para checkout
            if (confirm(`Imprimir etiqueta para ${child.name}?`)) {
                printLabelWithCheckout(checkin.id, child.name, child.allergies, null);
            }
        }

        async function checkoutByQR(checkinId) {
            const { data: checkin, error } = await supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(name)')
                .eq('id', checkinId)
                .is('checked_out_at', null)
                .single();
            if (error || !checkin) {
                document.getElementById('scanResult').innerHTML = '❌ Check-out inválido ou já realizado';
                return;
            }
            await supabaseClient.from('kids_check_ins').update({ checked_out_at: new Date().toISOString() }).eq('id', checkinId);
            document.getElementById('scanResult').innerHTML = `✅ Check-out: ${checkin.child.name}`;
            await loadPresentList();
        }

        function printLabelWithCheckout(checkinId, childName, allergies, responsibleName, responsiblePhone = '') {
            const sessionName = document.getElementById('sessionSelect').selectedOptions[0]?.text || 'Culto';
            const now = new Date().toLocaleString();
            const checkoutToken = `checkout_${checkinId}`;
            // Gerar QR code em canvas
            const qrDiv = document.createElement('div');
            new QRCode(qrDiv, { text: checkoutToken, width: 120, height: 120 });
            setTimeout(() => {
                const qrImage = qrDiv.querySelector('img')?.src || '';
                const labelHTML = `
                    <div style="width: 58mm; padding: 2mm; font-family: monospace; font-size: 10pt;">
                        <div style="text-align: center; font-weight: bold;">⛪ Kids Checkin</div>
                        <div><strong>Criança:</strong> ${childName}</div>
                        ${allergies ? `<div><strong>Alergias:</strong> ${allergies}</div>` : ''}
                        <div><strong>Responsável:</strong> ${responsibleName || 'Família cadastrada'}</div>
                        ${responsiblePhone ? `<div><strong>Telefone:</strong> ${responsiblePhone}</div>` : ''}
                        <div><strong>Sessão:</strong> ${sessionName}</div>
                        <div><strong>Check-in:</strong> ${now}</div>
                        <div style="text-align: center; margin-top: 4px;">
                            <img src="${qrImage}" width="80" height="80" alt="QR checkout">
                            <div style="font-size: 8pt;">Escanear para saída</div>
                        </div>
                    </div>
                `;
                const printDiv = document.getElementById('printArea');
                printDiv.innerHTML = labelHTML;
                printDiv.style.display = 'block';
                window.print();
                printDiv.style.display = 'none';
            }, 500);
        }

        // Visitante
        async function registerVisitant() {
            const childName = document.getElementById('visitantName').value.trim();
            const respName = document.getElementById('respName').value.trim();
            const respPhone = document.getElementById('respPhone').value.trim();
            if (!childName || !respName) { alert('Preencha os dados'); return; }
            const { data: visitant, error } = await supabaseClient.from('kids_visitants').insert({
                child_name: childName,
                responsible_name: respName,
                responsible_phone: respPhone,
                session_id: currentSessionId,
                checked_in_by: currentStaffId
            }).select().single();
            if (error) { alert(error.message); return; }
            alert('Visitante registrado');
            closeModal();
            await loadPresentList();
            // Como visitante não tem checkin na tabela kids_check_ins, geramos um ID fictício? 
            // Para simplificar, vamos gerar um check-in na tabela kids_check_ins também?
            // Melhor: criamos um check-in para visitante na mesma tabela? Ou imprimimos etiqueta com token custom?
            // Vamos criar um check-in para o visitante, mas sem child_id. Precisamos adaptar.
            // Por ora, apenas registramos na lista de visitantes e imprimimos etiqueta sem QR checkout.
            if (confirm(`Imprimir etiqueta para ${childName}?`)) {
                // Etiqueta sem QR (pois não há checkin_id)
                printSimpleLabel(childName, respName, respPhone);
            }
            document.getElementById('visitantName').value = '';
            document.getElementById('respName').value = '';
            document.getElementById('respPhone').value = '';
        }

        function printSimpleLabel(childName, respName, respPhone) {
            const sessionName = document.getElementById('sessionSelect').selectedOptions[0]?.text;
            const now = new Date().toLocaleString();
            const labelHTML = `
                <div style="width: 58mm; padding: 2mm;">
                    <div style="font-weight:bold;">Visitante</div>
                    <div>${childName}</div>
                    <div>Resp: ${respName}</div>
                    <div>Tel: ${respPhone || '-'}</div>
                    <div>${sessionName} - ${now}</div>
                </div>
            `;
            const printDiv = document.getElementById('printArea');
            printDiv.innerHTML = labelHTML;
            printDiv.style.display = 'block';
            window.print();
            printDiv.style.display = 'none';
        }

        // Lista de presentes (crianças + visitantes)
        async function loadPresentList() {
            if (!currentSessionId) return;
            const { data: checkins } = await supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(id, name, allergies)')
                .eq('session_id', currentSessionId)
                .is('checked_out_at', null);
            const { data: visitants } = await supabaseClient
                .from('kids_visitants')
                .select('*')
                .eq('session_id', currentSessionId);
            let html = '';
            if (checkins?.length) {
                html += `<h4>👶 Cadastrados</h4>`;
                html += checkins.map(c => `
                    <div class="present-item">
                        <div><strong>${c.child.name}</strong> ${c.child.allergies ? `<span class="badge">⚠️</span>` : ''}<br><small>${new Date(c.checked_in_at).toLocaleTimeString()}</small></div>
                        <div>
                            <button class="btn-print" onclick="printLabelWithCheckout('${c.id}', '${c.child.name}', '${c.child.allergies || ''}', null)">🖨️</button>
                            <button class="btn-checkout" onclick="checkoutManual('${c.id}')">Check-out</button>
                        </div>
                    </div>
                `).join('');
            }
            if (visitants?.length) {
                html += `<h4>📝 Visitantes</h4>`;
                html += visitants.map(v => `
                    <div class="present-item visitant-item">
                        <div><strong>${v.child_name}</strong> (${v.responsible_name})<br><small>${new Date(v.checked_in_at).toLocaleTimeString()}</small></div>
                        <div>
                            <button class="btn-print" onclick="printSimpleLabel('${v.child_name}', '${v.responsible_name}', '${v.responsible_phone || ''}')">🖨️</button>
                            <button class="btn-checkout" onclick="removeVisitant('${v.id}')">Finalizar</button>
                        </div>
                    </div>
                `).join('');
            }
            if (!checkins?.length && !visitants?.length) html = '<p>Nenhum presente</p>';
            document.getElementById('presentList').innerHTML = html;
        }

        async function checkoutManual(checkinId) {
            await supabaseClient.from('kids_check_ins').update({ checked_out_at: new Date().toISOString() }).eq('id', checkinId);
            await loadPresentList();
        }
        async function removeVisitant(id) {
            await supabaseClient.from('kids_visitants').delete().eq('id', id);
            await loadPresentList();
        }

        // Sessão
        function openSessionModal() { document.getElementById('sessionModal').style.display = 'flex'; }
        function closeSessionModal() { document.getElementById('sessionModal').style.display = 'none'; }
        async function createSession() {
            const name = document.getElementById('sessionName').value.trim();
            const date = document.getElementById('sessionDate').value;
            const start = document.getElementById('sessionStart').value;
            const end = document.getElementById('sessionEnd').value;
            if (!name || !date) { alert('Nome e data são obrigatórios'); return; }
            const { error } = await supabaseClient.from('kids_sessions').insert({
                name, session_date: date, start_time: start, end_time: end, is_active: true
            });
            if (error) alert(error.message);
            else {
                closeSessionModal();
                await loadSessions();
            }
        }

        function openVisitanteModal() { document.getElementById('visitanteModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('visitanteModal').style.display = 'none'; }
        async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
