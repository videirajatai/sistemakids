<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Equipe | Kids Checkin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #edf2f7; padding-bottom: 5rem; }
        .header { background: #0f172a; color: white; padding: 1rem 1.5rem; border-radius: 0 0 1.8rem 1.8rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .header h2 { font-size: 1.4rem; }
        .header-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; }
        .header-btn:hover { background: rgba(255,255,255,0.3); }
        .container { max-width: 800px; margin: 1.2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1.2rem; box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        .btn-primary { background: #3b82f6; color: white; border: none; padding: 0.6rem 1rem; border-radius: 2rem; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 0.6rem 1rem; border-radius: 2rem; cursor: pointer; }
        .present-item { background: #e6f7e6; padding: 0.8rem; border-radius: 1rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
        .visitant-item { background: #fff3e0; border-left: 4px solid #f59e0b; }
        .btn-checkout { background: #ef4444; color: white; border: none; padding: 0.3rem 1rem; border-radius: 2rem; margin-left: 0.5rem; cursor: pointer; }
        .btn-print { background: #10b981; border: none; padding: 0.3rem 1rem; border-radius: 2rem; color: white; margin-left: 0.5rem; cursor: pointer; }
        .btn-eye { background: #3b82f6; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; color: white; margin-left: 0.5rem; cursor: pointer; font-size: 0.9rem; }
        .fab-visitante { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #f59e0b; width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; cursor: pointer; border: none; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: white; width: 90%; max-width: 550px; border-radius: 1.8rem; padding: 1.5rem; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; padding: 0.7rem; border-radius: 1rem; margin: 0.4rem 0; border: 1px solid #cbd5e1; }
        .badge { font-size: 0.7rem; background: #e2e8f0; padding: 0.2rem 0.5rem; border-radius: 2rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .tab { padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; background: #f1f5f9; transition: 0.2s; }
        .tab.active { background: #3b82f6; color: white; }
        .room-list { max-height: 400px; overflow-y: auto; }
        .room-item { display: flex; align-items: center; gap: 1rem; padding: 0.5rem; border-bottom: 1px solid #e2e8f0; }
        .room-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .room-item label { flex: 1; }
        .parent-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 1rem; }
        /* Relatório PDF */
        .report-container { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .report-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        .report-header img { max-width: 80px; margin-bottom: 10px; }
        .report-title { font-size: 24px; font-weight: bold; color: #0f172a; }
        .stats-grid { display: flex; gap: 20px; justify-content: space-around; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { background: #f1f5f9; border-radius: 16px; padding: 15px; text-align: center; min-width: 120px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #3b82f6; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; }
        th { background: #e2e8f0; }
        .birthday { background: #fef9c3; }
        @media print { body * { visibility: hidden; } #reportPrintArea, #reportPrintArea * { visibility: visible; } #reportPrintArea { position: absolute; top: 0; left: 0; width: 100%; } .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="header">
        <h2>👥 Equipe</h2>
        <div class="header-buttons">
            <button class="header-btn" onclick="gerarRelatorio()">📊 Relatórios</button>
            <button class="header-btn" onclick="logout()">Sair</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <h3>📅 Sessão atual</h3>
                <button class="btn-outline" onclick="openSessionModal()">+ Nova Sessão</button>
            </div>
            <select id="sessionSelect" onchange="changeSession()"></select>
        </div>
        <div class="card">
            <h3>📷 Escanear QR (entrada e saída)</h3>
            <div id="reader" style="width:100%;"></div>
            <button class="btn-primary" id="startScannerBtn" onclick="startScanner()">📸 Abrir Câmera</button>
            <button class="btn-outline" id="stopScannerBtn" onclick="stopScanner()" style="display:none;">Parar</button>
            <div id="scanResult" style="margin-top: 0.8rem; font-weight: 500;"></div>
        </div>
        <div class="card">
            <div class="tabs" id="tabsContainer">
                <div class="tab active" data-room="todos">👶 Todos</div>
                <div class="tab" data-room="Kids">🍼 Kids</div>
                <div class="tab" data-room="Babys">🧸 Babys</div>
                <div class="tab" data-room="Juvenis">⚡ Juvenis</div>
            </div>
            <div id="presentList">Carregando...</div>
        </div>
    </div>
    <div class="fab-visitante" onclick="openVisitanteModal()">➕📝</div>

    <!-- Modal visitante -->
    <div id="visitanteModal" class="modal">
        <div class="modal-content">
            <h3>Visitante rápido</h3>
            <input type="text" id="visitantName" placeholder="Nome da criança">
            <input type="text" id="respName" placeholder="Responsável">
            <input type="tel" id="respPhone" placeholder="Telefone">
            <button class="btn-primary" onclick="registerVisitant()">Registrar</button>
            <button class="btn-outline" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <!-- Modal nova sessão -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <h3>Nova Sessão</h3>
            <input type="text" id="sessionName" placeholder="Nome (ex: Culto Domingo)">
            <input type="date" id="sessionDate">
            <input type="time" id="sessionStart">
            <input type="time" id="sessionEnd">
            <button class="btn-primary" onclick="createSession()">Criar</button>
            <button class="btn-outline" onclick="closeSessionModal()">Cancelar</button>
        </div>
    </div>

    <!-- Modal detalhes da criança (olhinho) -->
    <div id="childDetailsModal" class="modal">
        <div class="modal-content" id="childDetailsContent"></div>
    </div>

    <!-- Modal para mover crianças para sala (ao clicar na aba diferente de "todos") -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <h3 id="roomModalTitle">Mover para sala</h3>
            <div id="roomChildrenList" class="room-list"></div>
            <button class="btn-primary" onclick="saveRoomAssignments()">Salvar</button>
            <button class="btn-outline" onclick="closeRoomModal()">Cancelar</button>
        </div>
    </div>

    <div id="printArea" style="display: none;"></div>
    <div id="reportPrintArea" style="display: none;"></div>

    <script>
        let currentStaffId = null, currentSessionId = null, html5QrCode = null, scannerActive = false;
        let autoRestartScanner = null;
        let currentRoomFilter = 'todos';
        let pendingRoom = null;
        let childrenForRoom = []; // lista de {checkinId, childId, name, photo, birth_date}

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentStaffId = user.id;
            await loadSessions();
            setupTabs();
        }

        async function loadSessions() {
            const { data } = await supabaseClient.from('kids_sessions').select('id, name, session_date, is_active').order('session_date', { ascending: false });
            const select = document.getElementById('sessionSelect');
            if (data?.length) {
                select.innerHTML = data.map(s => `<option value="${s.id}" ${s.is_active ? 'selected' : ''}>${s.name} (${new Date(s.session_date).toLocaleDateString()})</option>`).join('');
                const active = data.find(s => s.is_active);
                currentSessionId = active ? active.id : data[0].id;
                select.value = currentSessionId;
                await loadPresentList();
            } else {
                select.innerHTML = '<option>Nenhuma sessão. Crie uma.</option>';
            }
        }

        async function changeSession() {
            currentSessionId = document.getElementById('sessionSelect').value;
            await loadPresentList();
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', async () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentRoomFilter = tab.dataset.room;
                    if (currentRoomFilter === 'todos') {
                        await loadPresentList();
                    } else {
                        // Abre modal para selecionar crianças para esta sala
                        openRoomModal(currentRoomFilter);
                    }
                });
            });
        }

        async function openRoomModal(roomName) {
            pendingRoom = roomName;
            // Buscar todas as crianças presentes (check-ins ativos)
            const { data: checkins } = await supabaseClient
                .from('kids_check_ins')
                .select('id, child_id, child:child_id(id, name, birth_date, photo_url)')
                .eq('session_id', currentSessionId)
                .is('checked_out_at', null);

            if (!checkins?.length) {
                alert('Não há crianças presentes no momento.');
                return;
            }

            // Buscar rooms já atribuídas para estas crianças nesta sessão
            const { data: assigned } = await supabaseClient
                .from('kids_check_ins')
                .select('id, room')
                .eq('session_id', currentSessionId)
                .in('id', checkins.map(c => c.id));

            const roomMap = new Map();
            assigned?.forEach(a => roomMap.set(a.id, a.room));

            childrenForRoom = checkins.map(c => ({
                checkinId: c.id,
                childId: c.child_id,
                name: c.child.name,
                photo: c.child.photo_url,
                birth_date: c.child.birth_date,
                currentRoom: roomMap.get(c.id) || 'todos'
            }));

            const modalTitle = document.getElementById('roomModalTitle');
            modalTitle.innerText = `Mover crianças para sala: ${roomName}`;
            const container = document.getElementById('roomChildrenList');
            container.innerHTML = childrenForRoom.map(child => `
                <div class="room-item">
                    ${child.photo ? `<img src="${child.photo}" onerror="this.src='https://via.placeholder.com/40'">` : '<div style="width:40px;height:40px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;">👶</div>'}
                    <label>
                        <input type="checkbox" class="room-checkbox" data-checkin-id="${child.checkinId}" ${child.currentRoom === pendingRoom ? 'checked' : ''}>
                        ${escapeHtml(child.name)} ${child.birth_date ? `(${calculateAge(child.birth_date)} anos)` : ''}
                    </label>
                </div>
            `).join('');
            document.getElementById('roomModal').style.display = 'flex';
        }

        function calculateAge(birthDateStr) {
            const birth = new Date(birthDateStr);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        }

        async function saveRoomAssignments() {
            const checkboxes = document.querySelectorAll('.room-checkbox');
            const updates = [];
            for (const cb of checkboxes) {
                const checkinId = cb.dataset.checkinId;
                const shouldAssign = cb.checked;
                if (shouldAssign) {
                    updates.push({ id: checkinId, room: pendingRoom });
                } else {
                    // Se não estiver marcado e atualmente está na sala, volta para 'todos'
                    const child = childrenForRoom.find(c => c.checkinId == checkinId);
                    if (child && child.currentRoom === pendingRoom) {
                        updates.push({ id: checkinId, room: 'todos' });
                    }
                }
            }
            for (const upd of updates) {
                await supabaseClient.from('kids_check_ins').update({ room: upd.room }).eq('id', upd.id);
            }
            closeRoomModal();
            await loadPresentList(); // recarrega a lista (a aba "Todos" mostrará todos)
            // Voltar para aba "Todos"
            document.querySelector('.tab[data-room="todos"]').click();
        }

        function closeRoomModal() {
            document.getElementById('roomModal').style.display = 'none';
            pendingRoom = null;
        }

        // Scanner
        async function startScanner() {
            if (scannerActive) return;
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, onScanError);
                scannerActive = true;
                document.getElementById('startScannerBtn').style.display = 'none';
                document.getElementById('stopScannerBtn').style.display = 'inline-block';
            } catch(e) { alert('Erro ao acessar câmera: '+e); }
        }

        function stopScanner() {
            if (html5QrCode && scannerActive) {
                html5QrCode.stop();
                scannerActive = false;
                document.getElementById('startScannerBtn').style.display = 'inline-block';
                document.getElementById('stopScannerBtn').style.display = 'none';
            }
            if (autoRestartScanner) clearTimeout(autoRestartScanner);
        }

        async function onScanSuccess(decodedText) {
            stopScanner();
            await processToken(decodedText);
            autoRestartScanner = setTimeout(() => startScanner(), 3000);
        }

        function onScanError(err) { console.log(err); }

        async function processToken(token) {
            const { data: tokenData, error: tokenError } = await supabaseClient
                .from('kids_temporary_tokens')
                .select('*, child:child_id(id, name, allergies)')
                .eq('token', token)
                .single();

            if (tokenError || !tokenData) {
                document.getElementById('scanResult').innerHTML = '❌ QR inválido.';
                return;
            }

            if (new Date(tokenData.expires_at) < new Date()) {
                document.getElementById('scanResult').innerHTML = '❌ QR expirado.';
                return;
            }

            const childId = tokenData.child_id;
            const childName = tokenData.child?.name || 'Criança';
            const allergies = tokenData.child?.allergies || '';

            const { data: activeCheckin, error: checkError } = await supabaseClient
                .from('kids_check_ins')
                .select('id')
                .eq('child_id', childId)
                .eq('session_id', currentSessionId)
                .is('checked_out_at', null)
                .maybeSingle();

            if (checkError) {
                document.getElementById('scanResult').innerHTML = '❌ Erro ao verificar check-in.';
                return;
            }

            // CHECKOUT
            if (activeCheckin) {
                await supabaseClient
                    .from('kids_check_ins')
                    .update({ checked_out_at: new Date().toISOString() })
                    .eq('id', activeCheckin.id);
                // INVALIDAR QR
                await supabaseClient
                    .from('kids_temporary_tokens')
                    .update({ expires_at: new Date().toISOString() })
                    .eq('id', tokenData.id);
                document.getElementById('scanResult').innerHTML = `✅ Check-out: ${childName} (QR invalidado)`;
                await loadPresentList();
                return;
            }

            // CHECK-IN
            const { data: newCheckin, error: insertError } = await supabaseClient
                .from('kids_check_ins')
                .insert({
                    child_id: childId,
                    session_id: currentSessionId,
                    checked_in_by: currentStaffId,
                    token_id: tokenData.id,
                    room: 'todos'  // padrão
                })
                .select()
                .single();

            if (insertError) {
                document.getElementById('scanResult').innerHTML = '❌ Erro no check-in: ' + insertError.message;
                return;
            }

            document.getElementById('scanResult').innerHTML = `✅ Check-in: ${childName}`;
            await loadPresentList();
            if (confirm(`Imprimir etiqueta para ${childName}?`)) {
                printLabel(token, childName, allergies, newCheckin.id);
            }
        }

        function printLabel(qrToken, childName, allergies, checkinId) {
            const sessionName = document.getElementById('sessionSelect').selectedOptions[0]?.text || 'Culto';
            const now = new Date().toLocaleString();
            const tempDiv = document.createElement('div');
            new QRCode(tempDiv, { text: qrToken, width: 120, height: 120 });
            setTimeout(() => {
                let qrSrc = '';
                const img = tempDiv.querySelector('img');
                if (img && img.src) qrSrc = img.src;
                else {
                    const canvas = tempDiv.querySelector('canvas');
                    if (canvas) qrSrc = canvas.toDataURL();
                }
                const html = `
                    <div style="width: 58mm; padding: 2mm;">
                        <div style="text-align:center; font-weight:bold;">⛪ Kids Checkin</div>
                        <div><strong>Criança:</strong> ${escapeHtml(childName)}</div>
                        ${allergies ? `<div><strong>Alergias:</strong> ${escapeHtml(allergies)}</div>` : ''}
                        <div><strong>Sessão:</strong> ${escapeHtml(sessionName)}</div>
                        <div><strong>Check-in:</strong> ${now}</div>
                        <div style="text-align:center; margin-top:4px;">
                            <img src="${qrSrc}" width="80" height="80"><br>
                            <small>Escanear para saída</small>
                        </div>
                    </div>
                `;
                const printDiv = document.getElementById('printArea');
                printDiv.innerHTML = html;
                printDiv.style.display = 'block';
                window.print();
                printDiv.style.display = 'none';
            }, 300);
        }

        async function reprintLabelFromList(checkinId) {
            const { data: checkin, error } = await supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(name, allergies), token:token_id(token)')
                .eq('id', checkinId)
                .single();
            if (error || !checkin || !checkin.token) {
                alert('Token não encontrado para impressão.');
                return;
            }
            printLabel(checkin.token.token, checkin.child.name, checkin.child.allergies || '', checkinId);
        }

        async function showChildDetails(childId) {
            // Buscar dados da criança e da família
            const { data: child, error } = await supabaseClient
                .from('kids_children')
                .select('*, family:family_id(*)')
                .eq('id', childId)
                .single();
            if (error || !child) {
                alert('Erro ao carregar detalhes.');
                return;
            }
            const family = child.family || {};
            const html = `
                <div style="text-align:center;">
                    ${child.photo_url ? `<img src="${child.photo_url}" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">` : '<div style="width:100px;height:100px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem;">👶</div>'}
                    <h3>${escapeHtml(child.name)}</h3>
                    <p><strong>Nascimento:</strong> ${child.birth_date ? new Date(child.birth_date).toLocaleDateString() : 'Não informado'}</p>
                    <p><strong>Alergias:</strong> ${escapeHtml(child.allergies) || 'Nenhuma'}</p>
                    <p><strong>Necessidades especiais:</strong> ${escapeHtml(child.special_needs) || 'Nenhuma'}</p>
                    <hr>
                    <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                        <div style="text-align:center;">
                            ${family.father_photo ? `<img src="${family.father_photo}" style="width:60px;height:60px;border-radius:50%;">` : '<div style="width:60px;height:60px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;">👨</div>'}
                            <div><strong>Pai:</strong> ${escapeHtml(family.father_name) || 'Não informado'}</div>
                            <div>📞 ${escapeHtml(family.father_phone) || ''}</div>
                        </div>
                        <div style="text-align:center;">
                            ${family.mother_photo ? `<img src="${family.mother_photo}" style="width:60px;height:60px;border-radius:50%;">` : '<div style="width:60px;height:60px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;">👩</div>'}
                            <div><strong>Mãe:</strong> ${escapeHtml(family.mother_name) || 'Não informado'}</div>
                            <div>📞 ${escapeHtml(family.mother_phone) || ''}</div>
                        </div>
                    </div>
                </div>
            `;
            const modalContent = document.getElementById('childDetailsContent');
            modalContent.innerHTML = html;
            document.getElementById('childDetailsModal').style.display = 'flex';
        }

        function closeChildDetailsModal() {
            document.getElementById('childDetailsModal').style.display = 'none';
        }

        async function loadPresentList() {
            if (!currentSessionId) return;
            // Buscar check-ins ativos da sessão atual
            let query = supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(id, name, allergies, birth_date, photo_url)')
                .eq('session_id', currentSessionId)
                .is('checked_out_at', null);

            if (currentRoomFilter !== 'todos') {
                query = query.eq('room', currentRoomFilter);
            }
            const { data: checkins } = await query;

            const { data: visitants } = await supabaseClient
                .from('kids_visitants')
                .select('*')
                .eq('session_id', currentSessionId);

            let html = '';
            if (checkins?.length) {
                html += `<h4>👶 Crianças cadastradas</h4>`;
                for (const c of checkins) {
                    // aniversariante da semana?
                    let isBirthdayWeek = false;
                    if (c.child.birth_date) {
                        const birth = new Date(c.child.birth_date);
                        const today = new Date();
                        const weekLater = new Date();
                        weekLater.setDate(today.getDate() + 7);
                        const birthThisYear = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
                        if (birthThisYear >= today && birthThisYear <= weekLater) isBirthdayWeek = true;
                    }
                    const birthdayIcon = isBirthdayWeek ? '🎂 ' : '';
                    html += `
                        <div class="present-item">
                            <div>
                                <strong>${birthdayIcon}${escapeHtml(c.child.name)}</strong>
                                ${c.child.allergies ? '<span class="badge">⚠️</span>' : ''}
                                <br><small>${new Date(c.checked_in_at).toLocaleTimeString()}</small>
                            </div>
                            <div>
                                <button class="btn-eye" onclick="showChildDetails('${c.child_id}')">👁️</button>
                                <button class="btn-print" onclick="reprintLabelFromList('${c.id}')">🖨️</button>
                                <button class="btn-checkout" onclick="checkoutManual('${c.id}')">Check-out</button>
                            </div>
                        </div>
                    `;
                }
            }
            if (visitants?.length) {
                html += `<h4>📝 Visitantes</h4>`;
                html += visitants.map(v => `
                    <div class="present-item visitant-item">
                        <div><strong>${escapeHtml(v.child_name)}</strong> (${escapeHtml(v.responsible_name)})<br><small>${new Date(v.checked_in_at).toLocaleTimeString()}</small></div>
                        <div><button class="btn-checkout" onclick="removeVisitant('${v.id}')">Finalizar</button></div>
                    </div>
                `).join('');
            }
            if (!checkins?.length && !visitants?.length) html = '<p>Nenhuma criança presente.</p>';
            document.getElementById('presentList').innerHTML = html;
        }

        async function checkoutManual(checkinId) {
            await supabaseClient.from('kids_check_ins').update({ checked_out_at: new Date().toISOString() }).eq('id', checkinId);
            const { data: token } = await supabaseClient.from('kids_temporary_tokens').select('id').eq('checkin_id', checkinId).single();
            if (token) await supabaseClient.from('kids_temporary_tokens').update({ expires_at: new Date().toISOString() }).eq('id', token.id);
            await loadPresentList();
            document.getElementById('scanResult').innerHTML = '✅ Check-out manual.';
        }

        async function removeVisitant(id) {
            await supabaseClient.from('kids_visitants').delete().eq('id', id);
            await loadPresentList();
        }

        async function registerVisitant() {
            const childName = document.getElementById('visitantName').value.trim();
            const respName = document.getElementById('respName').value.trim();
            const respPhone = document.getElementById('respPhone').value.trim();
            if (!childName || !respName) { alert('Preencha os dados'); return; }
            const { error } = await supabaseClient.from('kids_visitants').insert({
                child_name: childName,
                responsible_name: respName,
                responsible_phone: respPhone,
                session_id: currentSessionId,
                checked_in_by: currentStaffId
            });
            if (error) { alert(error.message); return; }
            alert('Visitante registrado');
            closeModal();
            await loadPresentList();
            document.getElementById('visitantName').value = '';
            document.getElementById('respName').value = '';
            document.getElementById('respPhone').value = '';
        }

        function openSessionModal() { document.getElementById('sessionModal').style.display = 'flex'; }
        function closeSessionModal() { document.getElementById('sessionModal').style.display = 'none'; }
        async function createSession() {
            const name = document.getElementById('sessionName').value.trim();
            const date = document.getElementById('sessionDate').value;
            const start = document.getElementById('sessionStart').value;
            const end = document.getElementById('sessionEnd').value;
            if (!name || !date) { alert('Nome e data são obrigatórios'); return; }
            const { error } = await supabaseClient.from('kids_sessions').insert({
                name, session_date: date, start_time: start, end_time: end, is_active: true
            });
            if (error) alert(error.message);
            else {
                closeSessionModal();
                await loadSessions();
            }
        }

        function openVisitanteModal() { document.getElementById('visitanteModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('visitanteModal').style.display = 'none'; }

        // RELATÓRIO PDF
        async function gerarRelatorio() {
            if (!currentSessionId) { alert('Selecione uma sessão primeiro.'); return; }
            const { data: sessionData } = await supabaseClient.from('kids_sessions').select('name, session_date').eq('id', currentSessionId).single();
            const { data: checkins } = await supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(id, name, birth_date, allergies)')
                .eq('session_id', currentSessionId);
            const totalCriancas = checkins?.length || 0;
            const presentesAgora = checkins?.filter(c => !c.checked_out_at).length || 0;
            const hoje = new Date();
            const semanaFim = new Date(hoje); semanaFim.setDate(hoje.getDate() + 7);
            const aniversariantes = (checkins || []).filter(c => {
                if (!c.child.birth_date) return false;
                const nasc = new Date(c.child.birth_date);
                const aniversarioEsteAno = new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate());
                return aniversarioEsteAno >= hoje && aniversarioEsteAno <= semanaFim;
            }).map(c => c.child.name);
            const reportHtml = `
                <div class="report-container" id="reportContent">
                    <div class="report-header">
                        <img src="https://via.placeholder.com/80x80?text=Logo" alt="Logo">
                        <div class="report-title">Relatório de Presenças</div>
                        <div class="report-subtitle">${escapeHtml(sessionData?.name || 'Sessão')} - ${new Date(sessionData?.session_date).toLocaleDateString()}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number">${totalCriancas}</div><div class="stat-label">Total de crianças</div></div>
                        <div class="stat-card"><div class="stat-number">${presentesAgora}</div><div class="stat-label">Presentes agora</div></div>
                        <div class="stat-card"><div class="stat-number">${aniversariantes.length}</div><div class="stat-label">Aniversariantes da semana</div></div>
                    </div>
                    <h3>📋 Lista de crianças</h3>
                    <table><thead><tr><th>Nome</th><th>Idade</th><th>Alergias</th><th>Check-in</th><th>Check-out</th></tr></thead><tbody>
                        ${(checkins || []).map(c => {
                            let idade = '';
                            if (c.child.birth_date) {
                                const nasc = new Date(c.child.birth_date);
                                let age = hoje.getFullYear() - nasc.getFullYear();
                                const m = hoje.getMonth() - nasc.getMonth();
                                if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) age--;
                                idade = `${age} anos`;
                            }
                            const isBirthday = aniversariantes.includes(c.child.name);
                            return `<tr class="${isBirthday ? 'birthday' : ''}"><td>${escapeHtml(c.child.name)} ${isBirthday ? '🎂' : ''}</td><td>${idade}</td><td>${escapeHtml(c.child.allergies || '-')}</td><td>${new Date(c.checked_in_at).toLocaleString()}</td><td>${c.checked_out_at ? new Date(c.checked_out_at).toLocaleString() : 'Ainda presente'}</td></tr>`;
                        }).join('')}
                    </tbody></table>
                    <p><em>Relatório gerado em ${new Date().toLocaleString()}</em></p>
                </div>
            `;
            const printDiv = document.getElementById('reportPrintArea');
            printDiv.innerHTML = reportHtml;
            printDiv.style.display = 'block';
            const element = document.getElementById('reportContent');
            html2pdf().from(element).set({ margin: [0.5,0.5,0.5,0.5], filename: `relatorio_${sessionData?.name || 'sessao'}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).save().then(() => { printDiv.style.display = 'none'; }).catch(err => { alert('Erro ao gerar PDF'); printDiv.style.display = 'none'; });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
        async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
