<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Equipe | Kids Checkin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <script src="app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: #edf2f7; padding-bottom: 5rem; }
        .header {
            background: #0f172a;
            color: white;
            padding: 1.5rem;
            border-radius: 0 0 1.8rem 1.8rem;
        }
        .container { max-width: 700px; margin: 1rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-outline { background: white; border: 1px solid #3b82f6; color: #3b82f6; }
        .present-item {
            background: #e6f7e6;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .scanner-box { background: #f1f5f9; border-radius: 1.2rem; padding: 1rem; text-align: center; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; }
        .fab-visitante {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #f59e0b;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 8px 16px rgba(245,158,11,0.4);
            cursor: pointer;
            border: none;
        }
        input, select { width: 100%; padding: 0.7rem; border-radius: 1rem; border: 1px solid #cbd5e1; margin: 0.4rem 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 1.8rem;
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>👥 Equipe Ministerial</h2>
        <p>Check-in e controle de crianças</p>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.3rem 1rem; border-radius: 2rem; margin-top: 0.5rem;">Sair</button>
    </div>
    <div class="container">
        <div class="card">
            <h3>📷 Escanear QR Code (pais)</h3>
            <div class="scanner-box">
                <div id="reader"></div>
                <div id="scanResult" style="margin-top: 0.8rem; font-weight: 500;"></div>
            </div>
        </div>

        <div class="card">
            <h3>✔️ Crianças presentes agora</h3>
            <div id="presentList">Carregando...</div>
        </div>
    </div>

    <div class="fab-visitante" onclick="openVisitanteModal()">➕📝</div>

    <!-- Modal visitante -->
    <div id="visitanteModal" class="modal">
        <div class="modal-content">
            <h3>Cadastrar visitante rápido</h3>
            <input type="text" id="visitantName" placeholder="Nome da criança">
            <input type="text" id="respName" placeholder="Nome do responsável">
            <input type="tel" id="respPhone" placeholder="Telefone (opcional)">
            <select id="sessionSelect"></select>
            <button class="btn" onclick="registerVisitant()">Registrar e fazer check-in</button>
            <button class="btn-outline" style="margin-top: 0.5rem;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script>
        let currentStaffId = null;
        let currentSessionId = null;
        let html5QrCode = null;

        async function initStaff() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            currentStaffId = user.id;

            // Buscar sessão ativa
            const { data: sessions } = await supabaseClient
                .from('kids_sessions')
                .select('id, name')
                .eq('is_active', true)
                .limit(1);
            if (sessions && sessions[0]) {
                currentSessionId = sessions[0].id;
                const select = document.getElementById('sessionSelect');
                select.innerHTML = sessions.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            } else {
                alert('Nenhuma sessão ativa. Crie uma no banco (ex: Culto de Domingo).');
            }
            loadPresentChildren();
            startScanner();
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, onScanError);
        }

        async function onScanSuccess(decodedText) {
            await processToken(decodedText);
        }

        function onScanError(err) { console.log("erro scan", err); }

        async function processToken(token) {
            const { data: tokenData, error } = await supabaseClient
                .from('kids_temporary_tokens')
                .select('*, family:family_id(id)')
                .eq('token', token)
                .eq('is_used', false)
                .gt('expires_at', new Date().toISOString())
                .single();
            if (error || !tokenData) {
                document.getElementById('scanResult').innerHTML = '❌ Token inválido ou expirado';
                return;
            }
            await supabaseClient.from('kids_temporary_tokens').update({ is_used: true }).eq('id', tokenData.id);
            const { data: children } = await supabaseClient
                .from('kids_children')
                .select('*')
                .eq('family_id', tokenData.family_id);
            if (!children?.length) {
                document.getElementById('scanResult').innerHTML = '⚠️ Família sem crianças cadastradas';
                return;
            }
            for (let child of children) {
                await supabaseClient.from('kids_check_ins').insert({
                    child_id: child.id,
                    session_id: currentSessionId,
                    checked_in_by: currentStaffId,
                    token_id: tokenData.id
                });
            }
            document.getElementById('scanResult').innerHTML = `✅ Check-in realizado: ${children.map(c=>c.name).join(', ')}`;
            loadPresentChildren();
        }

        async function loadPresentChildren() {
            const { data } = await supabaseClient
                .from('kids_check_ins')
                .select('*, child:child_id(id, name)')
                .eq('session_id', currentSessionId)
                .is('checked_out_at', null);
            const container = document.getElementById('presentList');
            if (data && data.length) {
                container.innerHTML = data.map(c => `
                    <div class="present-item">
                        <span><strong>${c.child.name}</strong> (desde ${new Date(c.checked_in_at).toLocaleTimeString()})</span>
                        <button onclick="checkout('${c.id}')" style="background:#ef4444; border:none; padding:0.3rem 1rem; border-radius:2rem; color:white;">Check-out</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p>Nenhuma criança presente no momento.</p>';
            }
        }

        async function checkout(checkinId) {
            await supabaseClient.from('kids_check_ins').update({ checked_out_at: new Date().toISOString() }).eq('id', checkinId);
            loadPresentChildren();
        }

        async function registerVisitant() {
            const childName = document.getElementById('visitantName').value;
            const respName = document.getElementById('respName').value;
            const respPhone = document.getElementById('respPhone').value;
            const sessionId = document.getElementById('sessionSelect').value;
            if (!childName || !respName) { alert('Preencha nome da criança e responsável'); return; }
            await supabaseClient.from('kids_visitants').insert({
                child_name: childName,
                responsible_name: respName,
                responsible_phone: respPhone,
                session_id: sessionId,
                checked_in_by: currentStaffId
            });
            alert('Visitante registrado com sucesso!');
            closeModal();
            // Opcional: recarregar lista de presentes (visitantes não aparecem automaticamente na lista de check-ins)
        }

        function openVisitanteModal() { document.getElementById('visitanteModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('visitanteModal').style.display = 'none'; }
        async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }

        initStaff();
    </script>
</body>
</html>
