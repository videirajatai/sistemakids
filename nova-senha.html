<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha • Rede Kids</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        :root {
            --primary: #8b5a6a;
            --primary-hover: #7a4d5a;
            --bg-color: #fcf7f5;
            --text-main: #4a3b3e;
            --text-light: #7a6a6e;
            --input-bg: #fdfaf9;
            --border-color: #e6dcd8;
            --danger-text: #b34a4a;
            --success-text: #2d6a4f;
        }

        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-color); font-family: 'Inter', sans-serif; margin: 0; }
        .card { background: white; padding: 40px 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .card h2 { color: var(--primary); font-weight: 700; margin-top: 0; }
        .card p { color: var(--text-light); font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px 16px; margin: 10px 0; border: 2px solid var(--border-color); border-radius: 12px; box-sizing: border-box; font-size: 16px; background: var(--input-bg); transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 3px rgba(139, 90, 106, 0.1); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background: #c9a7b3; cursor: not-allowed; transform: none; }
        .erro { color: var(--danger-text); font-size: 14px; margin-top: 15px; display: none; background: #fdf0ee; padding: 10px; border-radius: 8px; border: 1px solid #f5d6d2; }
        .sucesso { color: var(--success-text); font-size: 14px; margin-top: 15px; display: none; background: #d1e7dd; padding: 10px; border-radius: 8px; border: 1px solid #b8d9c0; }
        .logo { width: 70px; margin-bottom: 10px; border-radius: 50%; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loading { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-loading .loading { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="Logo Kids" class="logo">
        <h2>Criar Nova Senha</h2>
        <p id="mensagem-instrucao">Digite sua nova senha de <strong>6 dígitos numéricos</strong> abaixo.</p>
        
        <input type="password" id="nova-senha" placeholder="6 dígitos numéricos (ex: 123456)" inputmode="numeric" maxlength="6" pattern="[0-9]*" required autocomplete="new-password" disabled>
        <input type="password" id="confirma-senha" placeholder="Repita a nova senha" inputmode="numeric" maxlength="6" pattern="[0-9]*" required autocomplete="new-password" disabled>
        
        <button id="btn-salvar" onclick="salvarNovaSenha()" disabled>Salvar Nova Senha</button>
        <p id="msg-erro" class="erro"></p>
        <p id="msg-sucesso" class="sucesso"></p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // ============================================================
        //  REGISTRAR LOG (rk_logs)
        // ============================================================
        async function registrarLogAcao(acao, email) {
            try {
                await supabaseClient.from('rk_logs').insert([{
                    datahora: new Date().toISOString(),
                    usuario: email || 'sistema',
                    nomelider: 'Sistema',
                    acao: acao
                }]);
            } catch (e) {
                console.error("Erro ao registrar log:", e);
            }
        }

        // ============================================================
        //  INICIALIZAR – RESTAURAR SESSÃO A PARTIR DO TOKEN NA URL
        // ============================================================
        (async function init() {
            const btn = document.getElementById('btn-salvar');
            const novaSenha = document.getElementById('nova-senha');
            const confirmaSenha = document.getElementById('confirma-senha');
            const msgInstrucao = document.getElementById('mensagem-instrucao');

            // Verifica se há um token de recuperação na URL (hash fragment)
            // O Supabase redireciona com #access_token=...&refresh_token=...
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type'); // pode ser 'recovery'

            if (accessToken && refreshToken) {
                try {
                    // Estabelece a sessão com os tokens recebidos
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    if (error) throw error;

                    // Habilita os campos e o botão
                    novaSenha.disabled = false;
                    confirmaSenha.disabled = false;
                    btn.disabled = false;
                    msgInstrucao.innerText = 'Digite sua nova senha de 6 dígitos.';
                } catch (err) {
                    document.getElementById('msg-erro').innerText = 'Erro ao validar o link de recuperação. Tente novamente ou solicite um novo link.';
                    document.getElementById('msg-erro').style.display = 'block';
                    console.error(err);
                }
            } else {
                // Se não houver tokens, tenta usar a sessão existente (caso o usuário já esteja logado)
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    // Já existe sessão, pode habilitar os campos
                    novaSenha.disabled = false;
                    confirmaSenha.disabled = false;
                    btn.disabled = false;
                    msgInstrucao.innerText = 'Digite sua nova senha de 6 dígitos.';
                } else {
                    // Sem tokens e sem sessão: não é possível redefinir
                    document.getElementById('msg-erro').innerText = 'Link de recuperação inválido ou expirado. Solicite um novo link.';
                    document.getElementById('msg-erro').style.display = 'block';
                    btn.disabled = true;
                    novaSenha.disabled = true;
                    confirmaSenha.disabled = true;
                }
            }
        })();

        // ============================================================
        //  SALVAR NOVA SENHA
        // ============================================================
        async function salvarNovaSenha() {
            const senha1 = document.getElementById('nova-senha').value.trim();
            const senha2 = document.getElementById('confirma-senha').value.trim();
            const erro = document.getElementById('msg-erro');
            const sucesso = document.getElementById('msg-sucesso');
            const btn = document.getElementById('btn-salvar');

            // Resetar mensagens
            erro.style.display = 'none';
            sucesso.style.display = 'none';

            // 1. Campos vazios?
            if (!senha1 || !senha2) {
                erro.innerText = "Preencha os dois campos!";
                erro.style.display = 'block';
                return;
            }

            // 2. Apenas 6 dígitos numéricos?
            if (!/^\d{6}$/.test(senha1)) {
                erro.innerText = "A senha deve conter exatamente 6 dígitos numéricos (0-9).";
                erro.style.display = 'block';
                return;
            }

            // 3. As senhas coincidem?
            if (senha1 !== senha2) {
                erro.innerText = "As senhas não são iguais!";
                erro.style.display = 'block';
                return;
            }

            // Bloquear botão com spinner
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-loading"><span class="loading"></span> Salvando...</span>';

            try {
                // Atualizar a senha no Auth – agora com sessão ativa
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: senha1
                });

                if (error) throw error;

                // Registrar log
                const { data: { user } } = await supabaseClient.auth.getUser();
                const email = user?.email || 'sistema';
                await registrarLogAcao(`Redefiniu a senha (usuário: ${email})`, email);

                // Sucesso
                sucesso.innerText = "Senha redefinida com sucesso! Redirecionando para o login...";
                sucesso.style.display = 'block';

                // Limpar campos e desabilitar para evitar novas tentativas
                document.getElementById('nova-senha').value = '';
                document.getElementById('confirma-senha').value = '';
                document.getElementById('nova-senha').disabled = true;
                document.getElementById('confirma-senha').disabled = true;
                btn.disabled = true;
                btn.innerHTML = 'Salvar Nova Senha';

                setTimeout(() => {
                    window.location.href = "index.html?t=" + Date.now();
                }, 2500);

            } catch (error) {
                erro.innerText = "Erro ao redefinir: " + error.message;
                erro.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Salvar Nova Senha';
            }
        }
    </script>
</body>
</html>
