name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24 (if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
        continue-on-error: true

      - name: Detect package manager and install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "📦 npm lockfile found → running npm ci"
            npm ci
          elif [ -f yarn.lock ]; then
            echo "📦 yarn lockfile found → running yarn install --frozen-lockfile"
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            echo "📦 No lockfile found, but package.json exists → running npm install"
            npm install
          else
            echo "ℹ️ No package.json found → skipping dependency installation"
          fi

      - name: Build project (if build script exists)
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            echo "🔨 Running npm run build"
            npm run build
          else
            echo "ℹ️ No build script found → skipping build"
          fi

      - name: Determine artifact path
        id: artifact-path
        run: |
          if [ -d dist ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d build ]; then
            echo "path=build" >> $GITHUB_OUTPUT
          elif [ -d out ]; then
            echo "path=out" >> $GITHUB_OUTPUT
          else
            echo "path=." >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.artifact-path.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
